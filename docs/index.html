<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pomodoro Timer</title>
        <link rel="stylesheet" href="./css/pomodoro_styles.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script defer src="./js/timer.js"></script>
    </head>
    <body>
        <header class="header">
           <div class="audio-controls">
                <audio id="background-music" loop>
                    <source src="./media/kuromi.mp3" type="audio/mpeg">
                </audio>
                <button id="music-toggle" class="music-btn"> Play Music</button>
            </div>
        </header>
        <main>
         <h1 class="title">Lelay's Pomodoro Timer</h1>
            <div class="timer-container">
                <div class="timer">
                    <div class="time-container">
                        <span id="timer-display">
                            00:00:00
                        </span>
                    </div>
                </div>
                <div class="session-status">
                    <span id="session-type"> </span>
                </div>

                <div class="session-length-container">
                    <label for="session-length">Session Length (in
                        minutes):</label>
                    <input type="number" class="session-input" id="session-length" value="25" min="1"
                        max="90">
                </div>

                <div class="buttons">
                    <button id="start" class="start">Start</button>
                    <button id="stop" class="stop">Pause</button>
                    <button id="reset" class="reset">Reset</button>
                </div>
            </div>

            <div class="kuromi-image-container">
                <img
                    src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/kuromi-1/sticker_5.gif?450a9647b06cdad8bd89a9136a7b6d92"
                    alt="Pomodoro Image" class="pomodoro-image">
            </div>
        </main>
    </body>
</html>
