<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tracker — Lelay's Kuromi Pomodoro</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="./css/shared.css">
        <link rel="stylesheet" href="./css/tracker.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="./js/shared.js"></script>
        <script defer src="./js/tracker.js"></script>
        <script defer src="./js/spotify.js"></script>
    </head>
    <body>

        <!-- Navigation -->
        <nav class="navbar">
            <a href="./index.html" class="nav-brand">
                <span class="brand-icon"><i class="fa-solid fa-heart" style="color: #cc88ff;"></i></span> Lelay's Pomodoro
            </a>
            <div class="nav-links">
                <a href="./index.html" class="nav-link">Timer</a>
                <a href="./tasks.html" class="nav-link">Tasks</a>
                <a href="./calendar.html" class="nav-link">Progress</a>
                <a href="./tracker.html" class="nav-link">Tracker</a>
            </div>
            <div class="nav-controls">
                <audio id="background-music" loop>
                    <source src="./media/kuromi.mp3" type="audio/mpeg">
                </audio>
                <button id="music-toggle" class="music-btn"><i class="fa-solid fa-volume-xmark"></i> Music</button>
            </div>
        </nav>



        <!-- Page Content -->
        <div class="page-container">
            <div class="page-header">
                <p id="kuromi-greeting" class="kuromi-greeting"></p>
                <h1 class="page-title">Session Tracker</h1>
                <p class="page-subtitle">Your productivity at a glance</p>
            </div>

            <!-- Kuromi Quote Banner -->
            <div id="kuromi-quote-banner" class="kuromi-quote-banner">

                <div class="quote-body">
                    <span class="quote-text">Loading inspiration...</span>
                </div>
                <button class="quote-refresh" title="New quote"><i class="fa-solid fa-sync"></i></button>
            </div>

            <div class="tracker-card glass">
                <div class="stats-grid">
                    <div class="stat-card glass-sm">
                        <div class="stat-value" id="stat-today">0</div>
                        <div class="stat-label">Today's Sessions</div>
                    </div>
                    <div class="stat-card glass-sm">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">Total Sessions</div>
                    </div>
                    <div class="stat-card glass-sm">
                        <div class="stat-value" id="stat-focus-time">0h 0m</div>
                        <div class="stat-label">Total Focus Time</div>
                    </div>
                    <div class="stat-card glass-sm">
                        <div class="stat-value" id="stat-streak">0</div>
                        <div class="stat-label">Current Streak</div>
                    </div>
                    <div class="stat-card glass-sm">
                        <div class="stat-value" id="stat-best-streak">0</div>
                        <div class="stat-label">Best Streak</div>
                    </div>
                    <div class="stat-card glass-sm">
                        <div class="stat-value" id="stat-avg">0</div>
                        <div class="stat-label">Avg / Day</div>
                    </div>
                </div>

                <h3 class="log-section-title">Recent Sessions</h3>
                <ul id="session-log" class="session-log"></ul>
            </div>
        </div>

        <!-- Kuromi floating decorations -->
        <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/kuromi-1/sticker_5.gif?450a9647b06cdad8bd89a9136a7b6d92"
             alt="Kuromi" class="kuromi-float">
        <img src="https://i.pinimg.com/originals/e8/89/84/e88984e498667713a1ef901b3c346042.gif"
             alt="Kuromi" class="kuromi-float-right">



        <!-- Spotify Miniplayer -->
        <button id="spotify-toggle" class="spotify-toggle" title="Spotify Player"><i class="fa-solid fa-music"></i></button>
        <div id="spotify-panel" class="spotify-panel">
            <div class="spotify-header">
                <span class="spotify-header-title"><i class="fa-solid fa-headphones"></i> Study Playlist</span>
                <button id="spotify-close" class="spotify-close">&times;</button>
            </div>
            <div class="spotify-controls">
                <select id="spotify-playlist" class="spotify-playlist-select"></select>
                <div class="spotify-custom-row">
                    <input type="text" id="spotify-custom-input" placeholder="Paste Spotify playlist URL...">
                    <button id="spotify-custom-btn">Load</button>
                </div>
            </div>
            <div class="spotify-embed">
                <iframe id="spotify-iframe" style="border-radius:12px" width="100%" height="152" frameBorder="0"
                    allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>

    </body>
</html>
